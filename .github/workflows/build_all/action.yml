name: "Build All"

inputs:
  project:
    description: "Project name"
    required: false
  sccompile_password:
    description: "SC Compile Password"
    required: false

runs:
  using: "composite"
  steps:
  - name: Add msbuild to PATH
    uses: microsoft/setup-msbuild@v3
  - name: Configure build
    shell: cmd
    run: |
      ./premake5.bat
  - name: Before Build
    shell: cmd
    run: |
      ./before_build.bat
    env:
      SCCOMPILE_PASSWORD: ${{ inputs.sccompile_password }}
  - name: Build
    shell: cmd
    run: |
      msbuild -m build/WidescreenFixesPack.sln ${{inputs.project}} /property:Configuration=Release
  - name: Before Package
    shell: cmd
    run: |
      ./before_packaging.bat
  - name: Pack binaries
    shell: cmd
    run: |
      cd ./data
      release.bat
  - name: Upload artifacts to actions
    if: ${{ inputs.project == '' }}
    uses: actions/github-script@v7
    with:
      script: |
        const { DefaultArtifactClient } = require('@actions/artifact')
        const client = new DefaultArtifactClient()
        const fs = require('fs')
        const path = require('path')
        const dir = 'data/Archives'
        for (const file of fs.readdirSync(dir).filter(f => f.endsWith('.zip'))) {
          const filePath = path.join(dir, file)
          const name = path.basename(file, '.zip')
          console.log(`Uploading artifact: ${name}`)
          await client.uploadArtifact(name, [filePath], dir)
        }