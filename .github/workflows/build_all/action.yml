name: "Build All"

inputs:
  project:
    description: "Full msbuild command(s) to run (or empty to build everything)"
    required: false

runs:
  using: "composite"
  steps:
    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v3

    - name: Configure build
      shell: cmd
      run: |
        ./premake5.bat

    - name: Before Build
      shell: cmd
      run: |
        ./before_build.bat

    - name: Build
      shell: cmd
      run: |
        if "${{ inputs.project }}" == "" (
          echo Building ALL solutions...
          msbuild -m build/Win32.WidescreenFixesPack.slnx /p:Configuration=Release
          msbuild -m build/Win64.WidescreenFixesPack.slnx /p:Configuration=Release
          msbuild -m build/PCSX2F.WidescreenFixesPack.slnx /p:Configuration=Release
          msbuild -m build/PPSSPP.WidescreenFixesPack.slnx /p:Configuration=Release
          msbuild -m build/Dolphin.WidescreenFixesPack.slnx /p:Configuration=Release
          msbuild -m build/CXBXR.WidescreenFixesPack.slnx /p:Configuration=Release
        ) else (
          echo Building specific tag...
          ${{ inputs.project }}
        )

    - name: Before Package
      shell: cmd
      run: |
        ./before_packaging.bat

    - name: Pack binaries
      shell: cmd
      run: |
        cd ./data
        release.bat

    - name: Install artifact client
      if: ${{ inputs.project == '' }}
      shell: cmd
      run: |
        npm install @actions/artifact

    - name: Upload individual zip artifacts
      if: ${{ inputs.project == '' }}
      uses: actions/github-script@v9
      with:
        script: |
          const {DefaultArtifactClient} = require('./node_modules/@actions/artifact')
          const client = new DefaultArtifactClient()
          const path = require('path')
          const globber = await glob.create('data/Archives/*.zip')
          const files = await globber.glob()
          if (files.length === 0) {
            core.warning('No .zip files found in data/Archives.')
            return
          }
          for (const file of files) {
            const name = path.basename(file)
            core.info(`Uploading ${name}...`)
            await client.uploadArtifact(name, [file], 'data/Archives', { retentionDays: 90, skipArchive: true })
          }
