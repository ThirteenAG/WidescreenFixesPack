name: GitHub Actions Build

on:
  push:
    paths-ignore:
      - "**/*.md"
      - '**/*.txt'
    branches:
      - '**'
  pull_request:
    paths-ignore:
      - "**/*.md"
      - '**/*.txt'

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2025-vs2026

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v6
      with:
        submodules: recursive
    - name: Build Solution
      uses: ./.github/workflows/build_all
      env:
        SCCOMPILE_PASSWORD: ${{ github.event_name == 'push' && github.ref_name == 'master' && secrets.SCCOMPILE_PASSWORD || '' }}
        CODE_SIGNING_PFX: ${{ github.event_name == 'push' && github.ref_name == 'master' && secrets.CODE_SIGNING_PFX || '' }}
        CODE_SIGNING_PASSWORD: ${{ github.event_name == 'push' && github.ref_name == 'master' && secrets.CODE_SIGNING_PASSWORD || '' }}
    - name: Update Tags
      continue-on-error: true
      if: ${{ github.event_name == 'push' && github.ref_name == 'master' }}
      uses: ThirteenAG/update-tags@v3
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-artifacts:
    needs: build
    runs-on: windows-2025-vs2026
    if: ${{ needs.build.result == 'success' }}

    steps:
      - name: Download the bundle
        uses: actions/download-artifact@v8
        with:
          name: WidescreenFixesPack
          path: downloaded-zips

      - name: Install artifact client
        run: npm install @actions/artifact

      - name: Upload individual artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const {DefaultArtifactClient} = require('./node_modules/@actions/artifact')
            const client = new DefaultArtifactClient()
            const path = require('path')
            const globber = await glob.create('downloaded-zips/*.zip')
            const files = await globber.glob()
            if (files.length === 0) {
              core.warning('No .zip files found in the bundle.')
              return
            }
            for (const file of files) {
              const name = path.basename(file)
              core.info(`Uploading ${name}...`)
              await client.uploadArtifact(name, [file], 'downloaded-zips', { retentionDays: 90, skipArchive: true })
            }