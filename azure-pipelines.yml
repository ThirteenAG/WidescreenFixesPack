trigger:
  branches:
    include:
    - '*'
  paths:
    exclude:
    - .appveyor.yml

pr:
  branches:
    include:
    - '*'
  paths:
    exclude:
    - .appveyor.yml

jobs:
- job: Build
  timeoutInMinutes: 0
  cancelTimeoutInMinutes: 5

  pool:
    vmImage: windows-2025-vs2026

  strategy:
    matrix:
      Release:
        configuration: Release
      Debug:
        configuration: Debug

  steps:
  - task: CmdLine@2
    displayName: Before build
    inputs:
      script: |
        git submodule update --init --recursive
        premake5.exe vs2026
        ./before_build.bat

  - task: MSBuild@1
    displayName: Build
    inputs:
      solution: 'build/*.slnx'
      maximumCpuCount: true