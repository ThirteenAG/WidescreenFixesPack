[MAIN]
SkipIntro = 1
WindowedMode = 0
DisableNegativeMouseAcceleration = 1
SkipSystemDetection = 1
ForceCPUAffinityToAllCores = 1
PartialUltraWideSupport = 1
DisableDOF = 1
DisableBlackAndWhiteFilter = 0
DisableCharacterLighting = 0           // Disables Predator Vision, making enemies blend better with the environment; also affects characters in in-engine cutscenes.
EnhancedSonarVision = 0                // https://imgur.com/PfDDYG2
BlacklistIndicators = 0                // Enables bloom only in darkness.

[CONTROLS]
BlacklistControlScheme = 1             // Uses Blacklist-style controls (toggle cover, hold to aim, etc.).

[UNLOCKS]
UnlockDLC = 1                          // Unlocks all DLC content that can no longer be obtained due to server shutdown.

[LOGITECH]
LightSyncRGB = 1                       // Dims mouse and keyboard lighting in darkness (and vice versa with BlacklistIndicators). Only Logitech hardware is supported; requires the Logitech G HUB app.

[LAN]
FixLAN = 1
ServerAddr = 127.0.0.1

[2INSTANCESPLITSCREEN]
Enable = 1
// This is an experimental feature, it is not playable and intended for testing purposes only.
// Allows launching second instance of the game. Requires WindowedMode.
// Create a custom resolution to split the screen. E.g. 1920x1080 -> 1920x540.
// First instance will be positioned on top. Launch the second instance and connect via LAN.
// LAN matchmaking is not very stable, in case of an error try again, or restart both instances.
