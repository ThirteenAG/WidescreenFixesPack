[MAIN]
SkipIntro = 1
FOVFactor = 1.0

[WINDOWEDMODE]
WindowedMode = 0                              ; Enables windowed mode.
DoNotNotifyOnTaskSwitch = 0                   ; Prevents the window from reacting to focus loss.

[CAMERA]                                      ; WARNING: Disables Look Left, Look Right and Look Back actions.
Enable = 1                                    ; Free mouse look. Disabling this will also disable the other options in this section.
CameraReturnTimeout = 3.0                     ; Time in seconds before the camera starts returning to the original position.
CameraReturnSpeed = 2.0                       ; Speed at which the camera returns to the original position.

[TURNINDICATORS]
TurnIndicators = 1							  ; Enable turn indicators, they will automatically activate when turning.
ManualTurnIndicators = 0                      ; Enable manual turn indicators, tap LB or RB on gamepad to activate.
LeftIndicatorKey = 0xDB                       ; VK_OEM_4, the Left Brace key.
RightIndicatorKey = 0xDD                      ; VK_OEM_6, the Right Brace key.