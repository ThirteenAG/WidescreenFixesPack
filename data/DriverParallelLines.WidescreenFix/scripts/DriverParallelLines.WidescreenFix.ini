[MAIN]
SkipIntro = 1
FixFMVs = 2 // 0: disabled (FMVs are stretched) | 1: use aspect ratio reported by game (only 4:3 or 16:9) | 2: use value of FMV_AspectRatio
FMV_AspectRatio = 16:9 // custom aspect ratio, default is 16:9, works by cropping; set FixFMVs to 0 or 1 if too much is cropped.
FOVFactor = 1.0
MinResX = 0 // if the game doesn't allow to select desired resolution, make list of resolutions shorter by changing these
MinResY = 0 // to a minimum resolution you'd want to select (e.g. 1920 and 1080 will only display 1080p and above).