[MAIN]
ResX = 0
ResY = 0
ForceShadowBufferMode = 1            // Restores buffered shadows via dgVoodoo, which is included with the fix.
RawInputMouse = 1.0                  // Enables raw mouse input; also acts as a sensitivity multiplier.
RawInputMouseRawData = 0             // Uses raw mouse input without OS acceleration or speed adjustments (0 = disabled, 1 = enabled).
FMVWidescreenMode = 1                // Displays cutscenes and movies in fullscreen.
HudWidescreenMode = 2                // Offsets certain HUD elements to the screen edges.
HudAspectRatioConstraint = Auto      // Constrains the HUD to an aspect ratio. Use Auto, 16:9, 21:9, or a custom ratio.
SkipIntro = 0                        // Skips the intro logos.
SkipPressStartToContinue = 0         // Skips the "Press Fire to Continue" prompt.
RestoreCutsceneFOV = 1               // Restores the original FOV during cutscenes.
CutsceneBorders = 2                  // Set to 1 to disable borders, 2 to make border size depend on aspect ratio, and 0 for the default behavior (borders are always displayed).

