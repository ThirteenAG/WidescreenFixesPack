[MAIN]
FixHUD = 1                               ; Corrects HUD aspect ratio.
FixFOV = 1                               ; Corrects FOV aspect ratio.
Scaling = 0                              ; Adjusts FOV aspect ratio to be mathematically correct. Requires FixFOV to be enabled.
HudAspectRatioConstraint = Auto          ; Constrains the HUD to an aspect ratio. Use Auto, 16:9, 21:9, or a custom ratio.
FMVWidescreenMode = 1                    ; FMVs will appear in fullscreen for 16:9. (1 = Cropped | 2 = Stretched)
FEScale = 1.00                           ; Set the size of UI elements here. (Default = 1.00, Xbox = 0.92)
FMVScale = 1.00                          ; Set the size of FMVs here. (Default = 1.00)
AutoFitFE = 0                            ; Automatically fits 16:9 UI content to smaller aspect ratios.
AutoFitFMV = 1                           ; Automatically scales the FMVs to fully fit the width of the screen. This introduces black bars on aspect ratios smaller than 16:9.

[MISC]
SkipIntro = 1                            ; Skips FMVs that play when you launch the game.
ShowLangSelect = 0                       ; Shows the language selector when you launch the game.
WindowedMode = 0                         ; Enables windowed mode. (1 = Borderless | 2 = Border | 3 = Resizable Border | 4 = Borderless Fullscreen | 5 = Borderless Fullscreen Stretched)
HideDebugObjects = 1                     ; Hides debug objects. (1 = Remove Objects | 2 = Hide Objects with Pillarboxing)
CustomUserFilesDirectoryInGameDir = 0    ; User files will be stored in a specified directory (for example: "save"). Use '0' to disable.
ImproveGamepadSupport = 1                ; Replaces keyboard icons with gamepad icons and assigns front-end actions. Requires an XInput gamepad. (1 = Xbox Icons | 2 = PlayStation Icons | 3 = None)
LeftStickDeadzone = 10.0                 ; Controls the deadzone of the left analog stick.
RightStickDeadzone = 10.0                ; Controls the deadzone of the right analog stick.
ForcedAudioSampleRate = 44100            ; Set a custom sample rate for audio here. (44100 = Default | 0 = Disabled)
FPSLimit = -1                            ; Allows users to control the frame rate limit. (0 = Disabled | -1 = Monitor Refresh Rate | -2 = Double Monitor Refresh Rate)
BlackMagazineFix = 1                     ; Fixes black background in magazine covers. May not be compatible with all versions of the game.

[CAMERA]
Enable = 1                               ; Disabling this will also disable the other options in this section.
CameraReturnTimeout = 3.0                ; Time in seconds before the camera starts returning to the original position.
CameraReturnSpeed = 2.0                  ; Speed at which the camera returns to the original position.
StickLookSensitivity = 1.0               ; Multiplier for the camera look sensitivity with right stick.
MouseLookSensitivity = 1.0               ; Multiplier for the camera look sensitivity with mouse.
InvertLook = 0                           ; Inverts the camera vertical direction.
OnlyAllowHorizontalStickMovement = 0     ; Only allows horizontal stick movement for camera control. In case right stick is used to switch gears.

[GRAPHICS]
ConsoleGamma = 1                         ; A custom gamma curve, produces an image with more contrast and deeper colors, similar to the Xbox 360 version of some games.