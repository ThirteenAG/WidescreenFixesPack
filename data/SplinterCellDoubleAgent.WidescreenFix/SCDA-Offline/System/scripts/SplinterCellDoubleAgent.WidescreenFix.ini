[MAIN]
ResX = 0
ResY = 0
RawInputMouse = 1.0                 // Enables raw mouse input; also acts as a sensitivity multiplier.
RawInputMouseRawData = 0            // Uses raw mouse input without OS acceleration or speed adjustments (0 = disabled, 1 = enabled).
HudWidescreenMode = 1               // Offsets certain HUD elements to the screen edges.
HudAspectRatioConstraint = Auto     // Constrains the HUD to an aspect ratio. Use Auto, 16:9, 21:9, or a custom ratio.
ForceLL = 1                         // Fixes the startup crash; equivalent to the -ll shortcut switch.
SingleCoreAffinity = 0              // Experimental; attempts to avoid mid-loading hangs (may cause performance issues).
DisablePreCache = 0                 // Experimental; improve loading times by disabling pre cache (may cause issues with certain sounds not loading).

[GRAPHICS]
ShadowMapResolutionMultiplier = 8   // Multiplier for shadow map resolution. Higher values increase shadow quality but may reduce performance.
GlowResolutionMultiplier = 8        // Multiplier for glow effect resolution. Higher values increase glow quality but may reduce performance.
MirrorResolutionMultiplier = 3      // Multiplier for reflection resolution. Higher values increase reflection quality but may reduce performance.
ConsoleGamma = 1                    // Enables Xbox 360 gamma.

[MISC]
SkipIntro = 1
EnableRunDuringForcedWalk = 1       // Allows running during forced walk sections.
FPSLimit = 60                       // Recommended: 60, increasing the frame rate can lead to issues with AI pathfinding and physics objects.

[BONUS]
BlacklistIndicators = 0
; Indicators behave like in Blacklist: they are not visible in the light and are visible in the shadows. The more visible you are, the weaker they glow. Set the option to 2 to invert this behavior.
; 0 - Default
; 1 - https://imgur.com/nSVK2AR
; 2 - https://imgur.com/vnw3kaF
GogglesLightColor = 0
; 0 - Default (visibility indicator) [https://imgur.com/3AOqt3P]
; 1 - Green                          [https://i.imgur.com/jYnWkzh.png]
; 2 - Voron Red                      [https://i.imgur.com/frld2DR.png]
; 3 - Topaz                          [https://i.imgur.com/vsZvEWk.png]
LightSyncRGB = 1                    // Only Logitech hardware is supported; requires the Logitech G HUB app.

;The following graphics settings are recommended for modern systems to enhance visual quality and performance.
;They will be applied on startup. Remove them from this file to disable and customize the settings on your own.
;Set StartupFullscreen=False for windowed mode
[WinDrv.WindowsClient]
StartupFullscreen=True
TextureDetail=UltraHigh

[GENERAL]
DisableHDRTonemapping=False
LowResTex=False
SimpleShader=False
SimpleEffect=False
HidePieces=False

[Graphics]
bEnableHDR=True 
bSpecularLighting=True 
bHighQualityVisualFX=True

[D3DDrv.D3DRenderDevice]
UseHWShadowMapping=False
ShadowResolutionDegree=0
ShadowTurnOffDegree=0
bUseSmoothShadow=True 
FSAADegree=0

[Engine.Input]
;Controller Profile for Xidi
Joy1=Jump
Joy2=Duck
Joy3=Interaction
Joy4=Scope
Joy5=SwitchCam
Joy6=QuickInventory
Joy7=AltFire
Joy8=Fire
Joy9=PauseMenu
Joy10=BackToWall
Joy11=AnalogRightDown
Joy12=OpsatMenu
Joy13=DPadUp
Joy14=DPadRight
Joy15=DPadDown
Joy16=DPadLeft
JoyX=Axis aStrafe DeadZone=0.3
JoyY=Axis aForward DeadZone=0.3
JoyZ=Axis aTurn DeadZone=0.3
JoyV=Axis aLookUp DeadZone=0.3
JoyR=Axis aAltFire DeadZone=0.0
JoyU=Axis aFire DeadZone=0.0
AnalogUp=AnalogUp
AnalogDown=AnalogDown
AnalogLeft=AnalogLeft
AnalogRight=AnalogRight
;Speed is now adjusted by 0.20 when using keyboard, allowing up to 5 variable speeds (like SCCT)
MouseWheelUp=AxisMod SpeedInc=0.20
MouseWheelDown=AxisMod SpeedInc=-0.20
;Assigns the console to the Tilde key
Tilde=Type 
