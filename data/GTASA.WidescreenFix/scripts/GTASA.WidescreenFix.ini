[MAIN]
HudWidthScale = 0.8             ; Original value is 1.0.
HudHeightScale = 0.8            ; Original value is 1.0.
RadarWidth = 85.5               ; Original value is 94.0. By default widescreen fix uses IV radar scaling: 85.5.
RadarHeight = 78.0              ; Original value is 76.0. By default widescreen fix uses IV radar scaling: 78.0.
SubtitlesScale = 0.0            ; Original value is 1.0.
ProportionalWeaponIcon = 1      ; Original value is 0.
NoCutsceneBorderAnimation = 0   ; Original value is 1.

[GRAPHICS]
; Drawing 1px line at top and left sides of the screen to hide antialiasing bug(0|1|2). (2) creates 4 lines to make the output symmetrical.
HideAABug = 2
; Makes menu background transparent with a blur (0|1).
TransparentMenu = 0
; A custom gamma curve similar to how GTA IV looked on the Xbox 360 (0|1).
ConsoleGamma = 0

[MISC]
; Game will not freeze when focus is lost (only in windowed mode).
AllowAltTabbingWithoutPausing = 0
; Disable the small white dot that appears while aiming with some weapons (0|1).
DisableWhiteCrosshairDot = 0
; Replaces text shadow with outline (0|1|2).
ReplaceTextShadowWithOutline = 2
; Enables VCS style camera shake (0|1).
VCSCamShake = 0