[MAIN]
SkipIntro = 1                    ; Skips the long Capcom and engine intro logos on game startup
BorderlessWindowed = 1           ; Forces the game to run in borderless windowed mode
SplitScreenSwapTopBottom = 0     ; Swaps the top and bottom player screens in local split-screen co-op
DisableDamageOverlay = 1         ; Removes the damage overlay that appears when you are low on health
DisableDBNOEffects = 0           ; Disables the screen effects that occur when you are downed
DisableObjectiveIndicator = 0    ; Hides the objective marker
CutsceneLetterbox = 1            ; Cinematic top/bottom bars during cutscenes
CutscenePillarbox = 1            ; Black bars on the left and right during cutscenes to enforce 16:9 aspect ratio
