[MAIN]
SkipIntro = 1                            ; Enables faster loading.
ImproveWindowedMode = 1                  ; Makes windowed mode borderless and resizes the window according to selected resolution.

[CAMERA]
Enable = 1                               ; Disabling this will also disable the other options in this section. Unbind the right stick from controls in order to use it for camera rotation or disable that feature.
CameraReturnTimeout = 3.0                ; Time in seconds before the camera starts returning to the original position.
CameraReturnSpeed = 2.0                  ; Speed at which the camera returns to the original position.
StickLookSensitivity = 1.0               ; Multiplier for the camera look sensitivity with right stick.
MouseLookSensitivity = 1.0               ; Multiplier for the camera look sensitivity with mouse.
InvertLook = 0                           ; Inverts the camera vertical direction.
OnlyAllowHorizontalStickMovement = 0     ; Only allows horizontal stick movement for camera control. In case right stick is used to switch gears.
; Press LS+RS at the same time to switch between original Free Look camera and the new one

[GRAPHICS]
ConsoleGamma = 1                         ; A custom gamma curve that creates a more contrasted image with deeper colors, similar to how some games looked on the Xbox 360.

[UNLOCKS]
UnlockAllCars = 0
UnlockChallenges = 0
UnlockEverything = 0