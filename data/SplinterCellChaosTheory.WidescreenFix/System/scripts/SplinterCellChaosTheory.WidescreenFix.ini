[MAIN]
ResX = 0
ResY = 0
RawInputMouse = 1.0                            // Enables raw mouse input. Also acts as a sensitivity multiplier.
RawInputMouseRawData = 0                       // Uses raw mouse input without OS acceleration or speed adjustments (0 = disabled, 1 = enabled).
HudWidescreenMode = 2                          // Offsets certain HUD elements to the screen edges.
HudAspectRatioConstraint = Auto                // Constrains the HUD to an aspect ratio. Use Auto, 16:9, 21:9, or a custom ratio.
DisableAltTabFix = 0                           // Set to 1 to disable the Alt+Tab fix.
SkipIntro = 1                                  // Same as -nointro.
SkipPressAnyKeyToContinue = 0                  // Skips the "Press Any Key to Continue" screen.

[WINDOWEDMODE]
ForceWindowedMode = 0                          // Enables forced windowed mode.
UsePrimaryMonitor = 0                          // Moves the window to the primary monitor.
CenterWindow = 1                               // Centers the window on the screen.
AlwaysOnTop = 0                                // Keeps the window always on top.
ForceWindowStyle = 0                           // 0: no change | 1: borderless fullscreen | 2: windowed | 3: resizable window | 4: no style.
DoNotNotifyOnTaskSwitch = 0                    // Prevents the window from reacting to focus loss.

[GRAPHICS]
; Shadow map size. Can be: 0, 2048, 3072, 4096, 5120, 6144, 7168, 8192, 16384
; 0 = 2048 = disables shadow map size changes and uses the game's default (2048).
ShadowMapResolution = 0
EnableShadowFiltering = 0                      // If set to 1, shadows will be smoother, but may break at multi-monitor resolutions.

[MISC]
FPSLimit = 60                                  // Recommended: 60, increasing the frame rate can lead to issues with AI pathfinding and physics objects.

[BONUS]
BlacklistIndicators = 0
; Indicators behave like in Blacklist: they are not visible in the light and are visible in the shadows. The more visible you are, the weaker they glow. Set the option to 2 to invert this behavior.
; Default: 0
; 1: https://imgur.com/i6IYfEE
; 2: https://imgur.com/DEHlqMf
GogglesLightColor = 0
; Default:    0
; Topaz:      0x907818   https://i.imgur.com/NkvtEuj.jpg
; Voron Red:  0xF00000   https://i.imgur.com/KgYBIIA.jpg
; Navy:       0x1848D8   https://i.imgur.com/blOfXlc.jpg
; Pink:       0x601848   https://i.imgur.com/hYTneNu.jpg
; Violet:     0x481878   https://i.imgur.com/ktxASgH.jpg
; White:      0xFFFFFF   https://i.imgur.com/BJnRZKl.jpg
; Gold:       0x606018   https://i.imgur.com/FB9QlkV.jpg
; Amber:      0x784800   https://i.imgur.com/vil4zn4.jpg
; Ghost Blue: 0x1878A8   https://i.imgur.com/vdCM2FQ.jpg
LightSyncRGB = 1                               // Only Logitech hardware is supported. Requires the Logitech G HUB app.

