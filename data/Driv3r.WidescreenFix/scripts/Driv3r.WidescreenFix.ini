[MAIN]
SkipIntro = 1
HudAspectRatioConstraint = Auto               ; Constrains the HUD to an aspect ratio. Use Auto, 16:9, 21:9, or a custom ratio.
FOVFactor = 1.0
DrawDistanceFactor = 4.0

[TURNINDICATORS]
TurnIndicators = 1							  ; Enable turn indicators, they will automatically activate when turning.
ManualTurnIndicators = 0                      ; Enable manual turn indicators.
LeftIndicatorKey = 0xDB                       ; VK_OEM_4, the Left Brace key.
RightIndicatorKey = 0xDD                      ; VK_OEM_6, the Right Brace key.
