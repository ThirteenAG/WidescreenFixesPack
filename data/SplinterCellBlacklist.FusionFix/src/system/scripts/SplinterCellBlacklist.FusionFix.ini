[MAIN]
SkipIntro = 1                              // Skips the intro videos.
SkipPressAnyKeyScreen = 1                  // Skips the "Press Any Key" screen and checkpoint selection.
FullscreenAtStartup = 1                    // Switches to fullscreen if the game starts in windowed mode.
DisableNegativeMouseAcceleration = 1
UltraWideSupport = 1                       // Disables damage overlay and fading in ultrawide.
FOVFactor = 1.0                            // Range: [0.5, 2.5].
ScreenCullBias = 0.0                       // 0.0 provides the best draw distance. The default value (1.0) causes distant objects to disappear.
DisableNightVisionFlash = 1                // Disables the white flash when activating night vision.
DisablePerfectionistChecks = 1             // Disables M&E UI and radar checks.
DefaultMissionFilter = 1                   // 0: All missions | 1: Active missions | 2: Campaign missions | 3: 4E missions.
SMIMapDisableStartupAnimation = 1
ForceCPUAffinityToAllCores = 1

[UNLOCKS]
UnlockDLC = 1                              // Unlocks all DLC content that can no longer be obtained due to server shutdown.
UnlockAllNonCampaignMissions = 1           // Unlocks all 4th Echelon missions from the start.
UnlockAllCampaignMissions = 0              // Unlocks all campaign missions from the start.

[EXTRACTION]                               // Charlie Missions
ExtractionWaveConfigs = Default            // Default | Random.
ExtractionWaveEnemyMultiplier = 1          // Multiplies the number of enemies in each wave when using the Default config.
; With the Random config, each enemy defined in the XML has its quantity multiplied by a random number between Min and Max for each spawn.
ExtractionWaveEnemyRandomRangeMin = 0
ExtractionWaveEnemyRandomRangeMax = 4

[HUNTER]                                   // Kobin Missions
ReinforcementsNumber = Default             // Default | Random.
ReinforcementsEnemyMultiplier = 1          // Multiplies the number of reinforcements when using the Default config.
; With the Random config, specifies the total number of reinforcements between Min and Max.
ReinforcementsEnemyRandomRangeMin = 1
ReinforcementsEnemyRandomRangeMax = 100

[GHOST]                                    // Grim Missions
DisableMissionFailOnDetection = 1          // If set to 1, the mission will not fail when the player is detected (when applicable).

[COOP]                                     // Briggs Missions
ReinforcementsNumber = Default             // Default | Random.
ReinforcementsEnemyMultiplier = 1          // Multiplies the number of reinforcements when using the Default config.
; With the Random config, specifies the total number of reinforcements between Min and Max. 
; Setting this value too high can make the final mission impossible to complete.
ReinforcementsEnemyRandomRangeMin = 10
ReinforcementsEnemyRandomRangeMax = 20
DisableMissionFailOnDetection = 0          // If set to 1, the mission will not fail when the player is detected (when applicable).

[CAMPAIGN]                                 // Story Missions
DisableMissionFailOnDetection = 0          // If set to 1, the mission will not fail when the player is detected (when applicable).
EnableRunDuringForcedWalk = 1              // Allows you to run during forced walk sections.

[LOGITECH]
LightSyncRGB = 1                           // Applies the selected suit indicator color to mouse and keyboard lighting. Only Logitech hardware is supported; requires the Logitech G HUB app.

[STARTUP] // https://github.com/unixoide/5th-echelon
DedicatedServerExePath = 
